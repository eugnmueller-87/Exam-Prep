# Nixpacks build config for Railway.
#
# We deliberately do NOT override the install/build phases here. Nixpacks
# auto-detects the Node project and runs `npm ci` + `npm run build` with its own
# cache-aware logic; overriding them caused an EBUSY error because a manual
# `npm ci` tried to remove the cache dir that Nixpacks mounts as a build volume.
#
# Node version is pinned to 24 via `.node-version` (Nixpacks reads it) — required
# because the app uses the stable built-in `node:sqlite` module (needs >=22.5).

[phases.setup]
nixPkgs = ["nodejs_24"]

[start]
cmd = "npm start"

# Render Blueprint — deploys the AB-100 Exam Prep tool as a public web service.
#
# One-time setup (see DEPLOY.md):
#   1. Push this repo to GitHub (done).
#   2. On https://render.com → New → Blueprint → connect this repo.
#   3. Render reads this file and provisions the service automatically.
#
# Result: a permanent public HTTPS URL (e.g. https://ab100-exam-prep.onrender.com)
# you can open from an iPad anywhere — no PC required, even while travelling.
#
# NOTE: The free tier does NOT support persistent disks, so the SQLite file
# lives on the container's ephemeral filesystem. This is fine for this app: the
# 172-question bank re-seeds automatically on every startup, so the quiz always
# works. Only your personal score history resets when the free instance restarts
# (it sleeps after ~15 min idle). To keep history permanently, upgrade the
# service to a paid "starter" plan and re-add the `disk:` block + set
# DATABASE_PATH to the mounted path (see the commented block at the bottom).

services:
  - type: web
    name: ab100-exam-prep
    runtime: node
    plan: free
    region: frankfurt # closest to the user (Germany); change if desired
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeploy: true # redeploy automatically on every push to main
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      # Writable path on the ephemeral filesystem (no disk on free tier).
      - key: DATABASE_PATH
        value: /tmp/data.db
# ── To make quiz history persistent (paid plan), use this instead ──
#   plan: starter
#   envVars:
#     - key: DATABASE_PATH
#       value: /var/data/data.db
#   disk:
#     name: data
#     mountPath: /var/data
#     sizeGB: 1
